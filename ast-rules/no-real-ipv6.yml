id: no-real-ipv6
language: rust
severity: warning
message: "Real IPv6 address — use RFC 3849 documentation prefix (2001:db8::/32) instead"
note: |
  Approved ranges:
    2001:db8::/32    RFC 3849 documentation  e.g. 2001:db8::1
           ::1       loopback
        fe80::/10    link-local              e.g. fe80::1
            ::       unspecified
rule:
  all:
    - any:
        - kind: string_literal
        - kind: line_comment
        - kind: block_comment
    - regex: "(?:[0-9a-fA-F]{1,4}:){2,7}[0-9a-fA-F]{0,4}"
    - not:
        regex: '(2001:[Dd][Bb]8:|::1\b|^::$|[Ff][Ee]80::|T\d{2}:\d{2}:\d{2})'
